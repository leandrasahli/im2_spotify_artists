<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBrainz API</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hero">
        <h1>Aura</h1>
        <p id="index-text">Find artists based on your favorite genre</p>
    </div>
    <p id="genre-title"></p>
    <div id="buttons_container">
        <button class="button" id="rock">Rock</button>
        <button class="button" id="electronic">Electronic</button>
        <button class="button" id="pop">Pop</button>
        <button class="button" id="latin">Latin</button>
        <button class="button" id="hiphop">Hip-Hop</button>
        <button class="button" id="folk">Folk</button>
        <button class="button" id="country">Country</button>
        <button class="button" id="indie">Indie</button>
    </div>
    <div id="content"></div>
    <script src="js/script.js" type="module"></script>
</body>
</html>
