<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBrainz API</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1 id="genre-title"></h1>
    <div id="buttons_container">
        <button class="button" id="rock" style="--i:0">Rock</button>
        <button class="button" id="electronic" style="--i:1">Electronic</button>
        <button class="button" id="pop" style="--i:2">Pop</button>
        <button class="button" id="latin" style="--i:3">Latin</button>
        <button class="button" id="hiphop" style="--i:4">Hip-Hop</button>
        <button class="button" id="folk" style="--i:5">Folk</button>
        <button class="button" id="country" style="--i:6">Country</button>
        <button class="button" id="indie" style="--i:7">Indie</button>
    </div>
    <div id="content"></div>
    <script src="js/script.js" type="module"></script>
</body>
</html>
